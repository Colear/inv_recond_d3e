<!-- stock/templates/stock/choix_type.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter du matériel - Choix du type</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Ajouter un nouveau matériel</h4>
                    </div>
                    <div class="card-body text-center py-5">
                        <p class="lead mb-4">Quel type de matériel souhaitez-vous ajouter au stock ?</p>
                        
                        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                            <a href="{% url 'ajouter_materiel' 'ecran' %}" class="btn btn-outline-primary btn-lg px-4">
                                🖥️ Écran
                            </a>
                            <a href="{% url 'ajouter_materiel' 'ordinateur' %}" class="btn btn-outline-dark btn-lg px-4">
                                💻 Ordinateur
                            </a>
                            <!-- Ajoutez d'autres boutons ici pour Clavier, Souris, etc. -->
                        </div>
                        
                        <div class="mt-4">
                            <a href="{% url 'liste_stock' %}" class="text-muted">Retour à la liste du stock</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
