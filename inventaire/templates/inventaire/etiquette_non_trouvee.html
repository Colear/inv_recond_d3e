<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matériel non trouvé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .card-custom {
            max-width: 350px;
            width: 100%;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 15px;
            background: white;
        }
        .icon-error {
            font-size: 5rem;
            color: #dc3545; /* Rouge Bootstrap */
            margin-bottom: 20px;
        }
        .inv-number {
            font-size: 2rem;
            font-weight: 700;
            color: #212529;
            background-color: #e9ecef;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin: 15px 0;
            font-family: monospace;
        }
        .btn-home {
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card card-custom p-5">
        <div class="card-body">
            
            <div class="icon-error">❌</div>
            
            <h2 class="h4 mb-3">Matériel non trouvé</h2>
            
            <p class="text-muted mb-2">
                {{ message|safe }}
            </p>
            
            <div class="inv-number">
                {{ numero_inv }}
            </div>
            
            <p class="small text-muted mt-3">
                Vérifiez que le matériel a bien été enregistré dans l'application avant de scanner cette étiquette.
            </p>

            <a href="{% url 'home' %}" class="btn btn-primary btn-home shadow-sm">
                🏠 Retour à l'accueil
            </a>
            
        </div>
    </div>

</body>
</html>
